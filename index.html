<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>

    <title>My Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weather-app-container">
      <div class="weather-app-header">
        <h1 class="city">
          <div id="city"></div>

          <div class="day-time" id="day-time"></div>
        </h1>

        <form class="search-form" id="search-form">
          <input
            type="text"
            placeholder="Type a city name..."
            required
            class="search-input"
            id="search-input"
          />

          <button class="search-button">
            <span class="material-symbols-outlined"> search </span>
          </button>
          <div class="weather-app-sidebutton">
            <button class="theme-button">
              <span class="material-symbols-outlined"> mode_night </span
              ><span class="material-symbols-outlined"> clear_day </span>
            </button>
          </div>
        </form>
      </div>

      <main>
        <div class="Weather-data">
          <span id="icon">☀️ </span>

          <span id="temperature"></span>
          <span id="tempUnit">
            <a href="#" id="celsius-link">°C |</a>

            <a href="#" id="fahrenheit-link">°F</a>
          </span>
        </div>
        <br />
        <div class="weather-info">
          <p id="description"></p>
          <p>Humidity: <strong id="humidity"></strong></p>

          <p>Wind: <strong id="wind"></strong></p>
        </div>
      </main>
      <footer>
        <p>
          This project was coded by
          <a
            href="https://www.shecodes.io/graduates/179824-baljeet-kaur"
            target="_blank"
            >Baljeet Kaur</a
          >
          is open-sourced on
          <a href="https://github.com/Bkaur90/My-Weather-App" target="_blank"
            >GitHub</a
          >
          and hosted on
          <a href="https://baljeetkaurweatherapp.netlify.app/" target="_blank"
            >Netlify</a
          >
        </p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
